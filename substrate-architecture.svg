<svg xmlns="http://www.w3.org/2000/svg" width="1340" height="990" viewBox="0 0 1340 990" font-family="'Iosevka','SF Mono','DejaVu Sans Mono',monospace">
  <defs>
    <marker id="arw" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#8a7560"/>
    </marker>
    <marker id="arwL" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#c87f4a"/>
    </marker>
    <style>
      .bg    { fill:#14110f; }
      .panel { fill:#1f1a16; stroke:#3a2f27; stroke-width:1.5; }
      .stage { fill:#241d18; stroke:#c87f4a; stroke-width:2; }
      .pulse { fill:#2a1d16; stroke:#e8a05a; stroke-width:2.5; }
      .side  { fill:#1c1a20; stroke:#9b7fae; stroke-width:1.8; }
      .world { fill:#161c22; stroke:#6a9bd1; stroke-width:1.8; }
      .title { fill:#e8c89a; font-size:15px; font-weight:bold; letter-spacing:1px; }
      .lbl   { fill:#e8c89a; font-size:14px; font-weight:bold; }
      .sub   { fill:#b8a892; font-size:11.5px; }
      .mono  { fill:#9c8a76; font-size:11px; }
      .tag   { fill:#c87f4a; font-size:11px; letter-spacing:2px; font-weight:bold; }
      .arc   { fill:none; stroke:#c87f4a; stroke-width:2; stroke-dasharray:5 4; }
      .flow  { stroke:#8a7560; stroke-width:2; fill:none; }
      .acc1  { fill:#e8a05a; }
    </style>
  </defs>

  <rect class="bg" width="1340" height="990"/>
  <text x="48" y="50" class="title" font-size="20px">WorldWeaver · the substrate + soul mind</text>
  <text x="48" y="74" class="sub">one self-generating loop. everything is derived from a single append-only ledger by decay — there is no second source of truth.</text>

  <!-- ===================== THE LOOP (left column) ===================== -->
  <path class="arc" d="M 92 250 C 40 250, 40 690, 92 690" marker-end="url(#arwL)"/>
  <text x="36" y="474" class="tag" transform="rotate(-90 36 474)">THE RHYTHM IS SELF-GENERATING</text>

  <!-- 1 perceive -->
  <rect class="stage" x="120" y="108" width="430" height="62" rx="10"/>
  <text x="140" y="134" class="lbl">① PERCEIVE</text>
  <text x="140" y="156" class="sub">world → substrate perturbations (node activations, scope "self")</text>

  <!-- 2 surprise -->
  <rect class="stage" x="120" y="206" width="430" height="78" rx="10"/>
  <text x="140" y="232" class="lbl">② SURPRISE  =  mismatch( stimulus , prediction )</text>
  <text x="140" y="254" class="sub">prediction = max( <tspan class="acc1">afterimage</tspan> , <tspan class="acc1">baseline</tspan> )  — fast intention over slow self</text>
  <text x="140" y="272" class="mono">a stimulus must beat BOTH to surprise  →  habituation falls out for free</text>

  <!-- 3 arousal -->
  <rect class="stage" x="120" y="316" width="430" height="62" rx="10"/>
  <text x="140" y="342" class="lbl">③ AROUSAL — leaky sum of surprise</text>
  <text x="140" y="364" class="sub">accumulates since last pulse · half-life 300s · circadian-scaled</text>

  <!-- 4 gate -->
  <rect class="stage" x="120" y="410" width="430" height="92" rx="10"/>
  <text x="140" y="436" class="lbl">④ GATE — does anything fire?</text>
  <text x="140" y="458" class="sub"><tspan class="acc1">IGNITE</tspan>  arousal &gt; threshold (reacting to change)</text>
  <text x="140" y="476" class="sub"><tspan class="acc1">SETTLE</tspan>  sustained calm lull → rest / potter</text>
  <text x="140" y="494" class="sub"><tspan class="acc1">FERVOR</tspan>  sustained high-charge, no outlet → make</text>

  <path class="flow" d="M335 170 L335 204" marker-end="url(#arw)"/>
  <path class="flow" d="M335 284 L335 314" marker-end="url(#arw)"/>
  <path class="flow" d="M335 378 L335 408" marker-end="url(#arw)"/>
  <path class="flow" d="M335 502 L335 556" marker-end="url(#arw)"/>

  <!-- 5 THE PULSE -->
  <rect class="pulse" x="120" y="558" width="430" height="96" rx="12"/>
  <text x="140" y="586" class="lbl" font-size="16px">⑤ THE PULSE</text>
  <text x="278" y="586" class="sub">— exactly one LLM call, only on a fire</text>
  <text x="140" y="610" class="mono">the only place the model is ever called. nothing else thinks.</text>
  <text x="140" y="632" class="mono">handed: igniting traces · arousal · mode · soul · memory · workshop</text>

  <!-- 6 typed pulse out -->
  <rect class="stage" x="120" y="678" width="430" height="78" rx="10"/>
  <text x="140" y="704" class="lbl">⑥ TYPED PULSE (validated dict)</text>
  <text x="140" y="726" class="sub"><tspan class="acc1">felt_sense</tspan> · <tspan class="acc1">keep</tspan> (a fact) · <tspan class="acc1">act</tspan> (one) · <tspan class="acc1">afterimage_cast</tspan></text>
  <text x="140" y="744" class="mono">routed back into the substrate; the one act handed to an effector</text>

  <path class="flow" d="M335 654 L335 676" marker-end="url(#arw)"/>
  <text x="120" y="792" class="tag">ROUTE →</text>
  <path class="flow" d="M250 760 C 250 800, 90 800, 92 692" marker-end="url(#arw)"/>
  <text x="210" y="812" class="mono">afterimage_cast → prediction (closes the loop; then it decays, surprise re-accrues)</text>

  <!-- ===================== SIDE STORES (right) ===================== -->
  <text x="640" y="134" class="tag">FED INTO THE PULSE — same embedder, two stores + two capabilities</text>

  <!-- soul / drive vector -->
  <rect class="side" x="640" y="150" width="300" height="124" rx="12"/>
  <text x="660" y="176" class="lbl">◆ SOUL → drive vector</text>
  <text x="660" y="198" class="sub">embeds the resident's own identity</text>
  <text x="660" y="215" class="sub">(constitution · growth · reverie)</text>
  <text x="660" y="240" class="mono">resonance(moment): "what in me</text>
  <text x="660" y="256" class="mono">does this touch?" — its own gravity</text>

  <!-- memory recall -->
  <rect class="side" x="960" y="150" width="300" height="124" rx="12"/>
  <text x="980" y="176" class="lbl">◆ KEPT MEMORY → recall</text>
  <text x="980" y="198" class="sub">same embed op, different store</text>
  <text x="980" y="222" class="mono">recall(moment): relevant facts,</text>
  <text x="980" y="238" class="mono">MMR-diversified (no groove pile-up)</text>
  <text x="980" y="254" class="mono">novel(): drop near-dup re-keeps</text>

  <!-- workshop (write) -->
  <rect class="world" x="640" y="294" width="300" height="124" rx="12"/>
  <text x="660" y="320" class="lbl">▣ WORKSHOP — write</text>
  <text x="660" y="342" class="sub">one sandboxed dir it cannot escape</text>
  <text x="660" y="359" class="sub">journals · drawings — its real output</text>
  <text x="660" y="384" class="mono">recent_makings → self-sameness:</text>
  <text x="660" y="400" class="mono">"you've worn a groove" novelty nudge</text>

  <!-- filescope (read) -->
  <rect class="world" x="960" y="294" width="300" height="124" rx="12"/>
  <text x="980" y="320" class="lbl">▣ FILESCOPE — read</text>
  <text x="980" y="342" class="sub">read-only, scoped to declared roots</text>
  <text x="980" y="359" class="sub">gitignore semantics (pathspec)</text>
  <text x="980" y="384" class="mono">+ hard secret default-deny (.env,</text>
  <text x="980" y="400" class="mono">keys, .ssh…). no write methods.</text>

  <path class="flow" d="M660 274 C 620 400, 600 560, 552 600" marker-end="url(#arw)" stroke="#9b7fae"/>
  <path class="flow" d="M660 418 C 624 480, 600 580, 552 616" marker-end="url(#arw)" stroke="#6a9bd1"/>

  <!-- ===================== WORLD band ===================== -->
  <rect class="world" x="640" y="438" width="620" height="86" rx="12"/>
  <text x="660" y="464" class="lbl">◐ THE WORLD (LocalWorld)</text>
  <text x="660" y="486" class="sub">grounded in the machine's clock, files, whispers — perceive reads it,</text>
  <text x="660" y="504" class="sub">the one act writes back · a whisper can force_ignite ("addressed → attend")</text>
  <path class="flow" d="M640 470 C 560 360, 580 220, 552 172" marker-end="url(#arw)" stroke="#6a9bd1" stroke-dasharray="4 4"/>

  <!-- ===================== LEDGER footing ===================== -->
  <rect class="panel" x="640" y="548" width="620" height="262" rx="14"/>
  <text x="664" y="582" class="title">THE LEDGER — the only state</text>
  <text x="664" y="606" class="sub">one append-only event log per resident. nothing above is stored twice.</text>
  <text x="664" y="630" class="mono">append:  surprise_trace · ignition · afterimage_cast ·</text>
  <text x="664" y="646" class="mono">baseline_updated · memory_kept · drive_nudge</text>
  <text x="664" y="676" class="lbl">derive at read time, by exponential decay:</text>
  <text x="680" y="700" class="mono">predict()   → afterimage (~minutes)  ⊔  baseline (~4h)</text>
  <text x="680" y="720" class="mono">arousal()   → leaky sum of surprise since last ignition</text>
  <text x="680" y="740" class="mono">memories()  → kept facts, newest-first; re-keeps refresh recency</text>
  <text x="664" y="772" class="sub" font-style="italic" fill="#c87f4a">the afterimage decays on its own → the world drifts → surprise re-accumulates</text>
  <text x="664" y="790" class="sub" font-style="italic" fill="#c87f4a">→ the next pulse fires. no scheduler. the rhythm makes itself.</text>

  <text x="48" y="942" class="mono">ww_agent/src/runtime/  ·  perception → integrator(salience + substrate) → pulse_engine(LLM) → effectors  ·  ~18 small files, no loops, no orchestrator</text>
  <text x="48" y="964" class="mono" fill="#6a6055">the rest of the megarepo (worldweaver_engine: FastAPI · React SPA · federation · shards) is the human-facing world — not this mind.</text>
</svg>
